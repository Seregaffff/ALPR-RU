        '204':
          description: No content
        '400':
          description: Bad request

  /lprs_callback:
    post:
      security: []
      tags:
        - LPRS --> Host
      description: Sends information about recognition event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
                - date
                - eventId
                - hasSpecial
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                date:
                  description: Event date
                  type: string
                  format: date-time
                eventId:
                  description: LPRS event identifier
                  type: integer
                  format: int64
                plates:
                  description: Short information about recognized license plate numbers
                  type: array
                  items:
                    type: object
                    properties:
                       type:
                         description: Type of the license plate
                         type: string
                         enum: [ "ru_1", "ru_1a" ]
                       number:
                         description: Recognized number
                         type: string
                hasSpecial:
                  type: boolean
            example:
              streamId: 1234
              date: '2024-08-22T07:44:59.844270217+00:00'
              eventId: 1002
              plates:
                - type: ru1
                  number: O232PX68
              hasSpecial: false
      responses:
        '200':
          description: Successful operation
        '204':
          description: No content

components:
