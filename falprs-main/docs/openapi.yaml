              date: '2026-04-14T12:40:09.492526949+00:00'
              eventId: 23
              barcodes:
                - position: [365, 676, 463, 681, 459, 780, 358, 776]
                  format: 'QR Code'
                  text: 'QWERTY'
      responses:
        '200':
          description: Successful operation
        '204':
          description: No content

