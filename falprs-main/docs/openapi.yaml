  /frs_callback_barcodes:
    post:
      security: []
      tags:
        - FRS --> Host
      description: Sends a barcode recognition event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
                - date
                - eventId
                - barcodes
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                date:
                  description: Event date
                  type: string
                  format: date-time
                eventId:
                  description: Event identifier from the barcodes log
                  type: integer
                  format: int64
                barcodes:
                  description: Information about found barcodes
                  type: array
                  items:
                    type: object
                    properties:
                      text:
                        description: Barcode text
                        type: string
