  /frs/api/sgSearchFaces:
    post:
      tags:
        - Host --> FRS
      summary: Search for Registered Faces
      description: Returns a list with information about found registered persons
      operationId: frs_sgSearchFaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - faces
                - dateStart
                - dateEnd
                - similarityThreshold
              properties:
                faces:
                  description: List of the registered face descriptors to search for
                  type: array
                  items:
                    type: integer
                dateStart:
                  description: Search start date
                  type: string
                  format: yyyy-mm-dd
                dateEnd:
                  description: Search end date
                  type: string
                  format: yyyy-mm-dd
                useLogs:
                  description: Flag to use FRS log during search
                  type: boolean
                  default: true
                useEvents:
                  description: Flag to use events during search
                  type: boolean
                  default: true
                similarityThreshold:
                  description: Search similarity threshold number from 0.0 to 1.0
                  type: number
                  format: float
            example:
              faces: [123, 234, 4567]
              dateStart: '2024-08-17'
              dateEnd: '2024-08-27'
              similarityThreshold: 0.5
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          required:
                            - date
                            - eventId
                            - uuid
                            - url
                            - faceId
                            - similarity
                          properties:
                            date:
                              description: Event or FRS log date
                              type: string
                              format: date-time
                            eventId:
                              description: Event identifier from the faces log
                              type: string
                            uuid:
                              description: UUID of host event or empty
                              type: string
                              format: uuid
                            url:
                              description: Url of the screenshot
                              type: string
                              format: url
                            faceId:
                              description: Registered face descriptor
                              type: integer
                            similarity:
                              description: Similarity of the found face
                              type: number
                              format: float
              example:
                code: "200"
                message: "Ok"
                data:
                  - date: 2024-08-23T08:34:28.901038859+00:00
                    eventId: 940788aa3497477ba5e91b309ff3caaf
                    uuid: bea2c82d-5ee2-4c70-b2ad-11349273c80a
                    url: 'https://...'
                    faceId: 123
                    similarity: 0.623
        '204':
          description: No content
        '400':
          description: Bad request

