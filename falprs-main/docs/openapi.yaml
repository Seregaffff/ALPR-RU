openapi: 3.0.3
info:
  title: Face and License Plate Recognition System
  description: |
    Face and License Plate Recognition System (FALPRS) is a web service that uses API for serving requests with POST method.
    Request and response are JSON objects. Response has the following format:
    
    | Name        | Type    | Description        |
    |-------------|---------|--------------------|
    | code        | string  | result's code      |
    | message     | string  | short message      |
    | data        | object  | payload (optional) |

    HTTP response codes `2хх` are considered to be successful, all others are errors, `3xx` redirects are not used.
    For the `204 No Content` status, the response body is absent.
    Examples:
    ```
    {
      "code": "200",
      "message": "Ok",
      "data": ...
    }
    ```
      
    ```
    {
      "code": "400",
      "message": "Bad Request"
    }
    ```
  version: 1.0.0
tags:
  - name: Host --> FRS
  - name: FRS --> Host
  - name: Host --> LPRS
  - name: LPRS --> Host
security:
  - bearerAuth: []
paths:

#FRS
  /frs/api/addStream:
    post:
      tags:
        - Host --> FRS
      summary: Add Video Stream
      description: Registers new video stream and it's configuration parameters in the system's database
      operationId: frs_addStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                url:
                  description: "Host's video stream identifier"
                  type: string
                  format: url
                  example: https://my.video.stream/capture
                callback:
                  description: URL for sending facial recognition events
                  type: string
                  format: url
                  example: https://my.host/callback?streamId=1
                callbackBarcodes:
                  description: URL for sending barcode recognition events
                  type: string
                  format: url
                  example: https://my.host/callback_barcodes?streamId=1
                faces:
                  description: List of registered face descriptors
                  type: array
                  items:
                    type: integer
                config:
                  $ref: '#/components/schemas/FRSDefaultVStreamConfig'
            example:
              streamId: '1234'
              url: 'https://host/getImage'
              callback: 'https://host/faceRecognized'
              config:
                tolerance: 0.8
                face-enlarge-scale: 1.6
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request

  /frs/api/listStreams:
    post:
      tags:
        - Host --> FRS
      summary: List Video Streams
      description: Returns a list of video streams and bounded face descriptors
      operationId: frs_listStreams
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          required:
                            - streamId
                          properties:
                            streamId:
                              $ref: '#/components/schemas/streamId'
                            url:
                              description: "Host's video stream identifier"
                              type: string
                              format: url
                            callback:
                              description: URL for sending facial recognition events
                              type: string
                              format: url
                            callbackBarcodes:
                              description: URL for sending barcode recognition events
                              type: string
                              format: url
                            faces:
                              description: List of registered face descriptors
                              type: array
                              items:
                                type: integer
                            config:
                              $ref: '#/components/schemas/FRSDefaultVStreamConfig'
              example:
                code: "200"
                message: "Ok"
                data:
                  - streamId: '1234'
                    faces: [123, 456, 789]
                  - streamId: '1236'
                    faces: [456, 789, 910]
        '204':
          description: No content
        '400':
          description: Bad request

  /frs/api/removeStream:
    post:
      tags:
        - Host --> FRS
      summary: Remove Video Stream
      description: Removes video stream and it's configuration parameters from the system's database
      operationId: frs_removeStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
            example:
              streamId: '1234'
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request

  /frs/api/addFaces:
    post:
      tags:
        - Host --> FRS
      summary: Bind Registered Face Descriptors to the Video Stream
      description: Binds a list of registered face descriptors to a video stream
      operationId: frs_addFaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
                - faces
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                faces:
                  description: List of registered face descriptors
                  type: array
                  items:
                    type: integer
            example:
              streamId: '1234'
              faces: [123, 234, 4567]
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request

  /frs/api/removeFaces:
    post:
      tags:
        - Host --> FRS
      summary: Unbind Registered Face Descriptors from the Video Stream
      description: Unbinds a list of registered face descriptors from a video stream
      operationId: frs_removeFaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
                - faces
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                faces:
                  description: List of registered face descriptors
                  type: array
                  items:
                    type: integer
            example:
              streamId: '1234'
              faces: [123, 234, 4567]
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request

  /frs/api/deleteFaces:
    post:
      tags:
        - Host --> FRS
      summary: Delete Face Descriptors
      description: Deletes registered face descriptors from the system's database
      operationId: frs_deleteFaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - faces
              properties:
                faces:
                  description: List of registered face descriptors
                  type: array
                  items:
                    type: integer
            example:
              faces: [123, 234, 4567]
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request

  /frs/api/listAllFaces:
    post:
      tags:
        - Host --> FRS
      summary: List All Registered Face Descriptors
      description: Returns a list of all registered face descriptors
      operationId: frs_listAllFaces
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: array
                        description: List of registered face descriptors
                        items:
                          type: integer
              example:
                code: "200"
                message: "Ok"
                data: [456, 789, 910]
        '204':
          description: No content
        '400':
          description: Bad request

  /frs/api/clusterFacesBySimilarity:
    post:
      tags:
        - Host --> FRS
      summary: Cluster Faces by Similarity
      description: Clusters the face descriptors using a similarity parameter
      operationId: frs_clusterFacesBySimilarity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - faces
                - similarity
              properties:
                faces:
                  description: List of registered face descriptors
                  type: array
                  items:
                    type: integer
                similarity:
                  description: Similarity parameter in the range from 0.0 to 1.0 for clustering
                  type: number
                  format: float
            example:
              faces: [1, 2, 3, 4, 5, 6, 7]
              similarity: 0.5
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: array
                        description: List of face clusters
                        items:
                          type: array
                          items:
                            type: integer
              example:
                code: "200"
                message: "Ok"
                data:
                  - [1, 6]
                  - [2, 4, 3]
                  - [5]
        '400':
          description: Bad request

  /frs/api/registerFace:
    post:
      tags:
        - Host --> FRS
      summary: Register Face Descriptor
      description: Creates a face descriptor and binds it to the video stream
      operationId: frs_registerFace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
                - url
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                url:
                  description: Registration image URL
                  type: string
                  format: url
                  example: https://my.server/image.jpg
                left:
                  description: X coordinate of the upper left corner of the rectangular face area
                  type: integer
                  default: 0
                top:
                  description: Y coordinate of the upper left corner of the rectangular face area
                  type: integer
                  default: 0
                width:
                  description: width of rectangular face area (0 - full image width)
                  type: integer
                  default: 0
                height:
                  description: width of rectangular face area (0 - full image height)
                  type: integer
                  default: 0
            example:
              streamId: '1234'
              url: "https://my.server/image.jpg"
              left: 537
              top: 438
              width: 142
              height: 156
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        properties:
                          faceId:
                            description: Registered face descriptor
                            type: integer
                          faceImage:
                            description: Registered descriptor's face image URL
                            type: string
                            format: url
                          left:
                            description: X coordinate of the upper left corner of the rectangular face area
                            type: integer
                            default: 0
                          top:
                            description: Y coordinate of the upper left corner of the rectangular face area
                            type: integer
                            default: 0
                          width:
                            description: width of rectangular face area (0 - full image width)
                            type: integer
                            default: 0
                          height:
                            description: width of rectangular face area (0 - full image height)
                            type: integer
                            default: 0
              example:
                code: "200"
                message: "Ok"
                data:
                  faceId: 4567
                  faceImage: 'data:image/jpeg,base64,...'
                  left: 537
                  top: 438
                  width: 142
                  height: 156
        '400':
          description: Bad request

  /frs/api/motionDetection:
    post:
      tags:
        - Host --> FRS
      summary: Motion detection notification
      description: |
        Starts or ends the cycled processing pipeline for video stream. Pipeline consists of searching barcodes or faces by means of face detection neural network.
        Then after filtering each founded face is recognized by another neural network.
        Successful results, if any, are send as event data using `callback` or `callbackBarcodes` parameter of the video stream.
        After delay (configuration parameter `delay-between-frames`) the pipeline starts again.
      operationId: frs_motionDetection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
                - start
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                start:
                  description: Sign of the beginning or end of movement
                  type: boolean
            example:
              streamId: '1234'
              start: true
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request


  /frs/api/doorIsOpen:
    post:
      tags:
        - Host --> FRS
      summary: Door Open Notification
      description: Stops processing pipeline for video stream
      operationId: frs_doorIsOpen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
            example:
              streamId: '1234'
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request

  /frs/api/bestQuality:
    post:
      tags:
        - Host --> FRS
      summary: Get the "Best" Shot From FRS Log
      description: Returns information about the best frame that contains a face
      operationId: frs_bestQuality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                date:
                  description: Event date (required if streamId is specified)
                  type: string
                  format: date-time
                eventId:
                  description: Event identifier from the faces log (required if streamId is not specified); if specified, then other parameters are ignored
                  type: integer
                  format: int64
                uuid:
                  description: UUID of host event
                  type: string
                  format: uuid
            example:
              eventId: 12345
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        properties:
                          screenshot:
                            description: Frame URL
                            type: string
                            format: url
                          left:
                            description: X coordinate of the upper left corner of the rectangular face area
                            type: integer
                            default: 0
                          top:
                            description: Y coordinate of the upper left corner of the rectangular face area
                            type: integer
                            default: 0
                          width:
                            description: width of rectangular face area (0 - full image width)
                            type: integer
                            default: 0
                          height:
                            description: width of rectangular face area (0 - full image height)
                            type: integer
                            default: 0
              example:
                code: "200"
                message: "Ok"
                data:
                  screenshot: 'https://falprs.host/frs/screenshots/group_1/2024-04-10/6/8/2/0/6820da5c-efe9-4b49-81fd-1f5ba33d3ee1.jpg'
                  left: 537
                  top: 438
                  width: 142
                  height: 156
        '204':
          description: No content
        '400':
          description: Bad request

  /frs/api/getEvents:
    post:
      tags:
        - Host --> FRS
      summary: Get List of Events From FRS Log
      description: Returns information about the best frame that contains a face
      operationId: frs_getEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - streamId
                - dateStart
                - dateEnd
              properties:
                streamId:
                  $ref: '#/components/schemas/streamId'
                dateStart:
                  description: Start date of the event interval
                  type: string
                  format: date-time
                dateEnd:
                  description: End date of the event interval
                  type: string
                  format: date-time
            example:
              streamId: '1234'
              dateStart: '2021-08-17 08:00:10 +00:00'
              dateEnd: '2021-08-17 09:00:10 +00:00'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          required:
                            - date
                            - screenshot
                            - quality
                            - left
                            - top
                            - width
                            - height
                          properties:
                            date:
                              description: Event date
                              type: string
                              format: date-time
                            faceId:
                              description: Registered face descriptor
                              type: integer
                            screenshot:
                              description: Frame URL
                              type: string
                              format: url
                            quality:
                              description: Face "quality" parameter
                              type: number
                              format: float
                            left:
                              description: X coordinate of the upper left corner of the rectangular face area
                              type: integer
                              default: 0
                            top:
                              description: Y coordinate of the upper left corner of the rectangular face area
                              type: integer
                              default: 0
                            width:
                              description: width of rectangular face area (0 - full image width)
                              type: integer
                              default: 0
                            height:
                              description: width of rectangular face area (0 - full image height)
                              type: integer
                              default: 0
              example:
                code: "200"
                message: "Ok"
                data:
                  - date: '2021-08-17T08:00:15.834+00:00'
                    quality: 890
                    screenshot: 'https://...'
                    left: 537
                    top: 438
                    width: 142
                    height: 156
                  - date: '2021-08-17T08:30:15.071+00:00'
                    faceId: 1234
                    quality: 562
                    screenshot: 'https://...'
                    left: 837
                    top: 338
                    width: 175
                    height: 182
        '204':
          description: No content
        '400':
          description: Bad request

  /frs/api/getBarcodeEvent:
    post:
      tags:
        - Host --> FRS
      summary: Get Barcode Event Info
      description: |
        Returns detailed information about the barcode recognition event. The request must specify the `eventId` parameter or both `streamId` and `date`. If `eventId` is specified, the method simply retrieves the data by identifier and sends it back. Otherwise, the method looks for the nearest event by video stream identifier in the interval determined by the `event-log-before` and `event-log-after` configuration parameters and the specified date.
      operationId: frs_getBarcodeEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventId:
                  description: Event identifier from the barcodes log (required if streamId is not specified); if specified, then other parameters are ignored
                  type: integer
                  format: int64
                streamId:
                  $ref: '#/components/schemas/streamId'
                date:
                  type: string
                  format: date-time
            examples:
              Example 1:
                value:
                  eventId: 1001
              Example 2:
                value:
                  streamId: 1234
                  date: '2026-03-22T09:11:33.822638+00:00'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        properties:
                          date:
                            description: Event date
                            type: string
                            format: date-time
                          screenshot:
                            type: string
                            format: url
                          barcodes:
                            description: Information about found barcodes
                            type: array
                            items:
                              type: object
                              properties:
                                text:
                                  description: Barcode text
                                  type: string
                                format:
                                  description: Barcode format (QR Code, EAN-13, etc.)
                                  type: string
                                position:
                                  description: Barcode contour
                                  type: array
                                  items:
                                    type: integer
              example:
                code: "200"
                message: "Ok"
                data:
                  date: '2026-04-14T12:57:13.574452+00:00'
                  screenshot: 'https://my.falprs.server/frs/barcodes/3/6/8/9/36892261-730c-42b7-a042-16f32ad37078.jpg'
                  barcodes:
                    - position: [416, 700, 605, 700, 600, 736, 406, 736]
                      format: 'EAN-13'
                      text: '2000218379163'
        '204':
          description: No content
        '400':
          description: Bad request

  /frs/api/getAdditionalFeatures:
    post:
      tags:
        - Host --> FRS
      summary: Get Additional Features Info
      description: |
        Returns information about additional features.
      operationId: frs_getAdditionalFeatures
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - qrCodeRecognition
                          - faceClustering
                        properties:
                          qrCodeRecognition:
                            description: QR code recognition support
                            type: boolean
                          faceClustering:
                            description: Face clustering support
                            type: boolean
              example:
                code: "200"
                message: "Ok"
                data:
                  qrCodeRecognition: true
                  faceClustering: true
        '400':
          description: Bad request

  /frs/api/setCommonConfig:
    post:
      tags:
        - Host --> FRS
      summary: Set Common Config Parameters
      description: |
        Sets common configuration parameters in the system's database
      operationId: frs_setCommonConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FRSCommonConfig'
            example:
              callback-timeout: 3s
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request
  /frs/api/getCommonConfig:
    post:
      tags:
        - Host --> FRS
      summary: Get Common Config Parameters
      description: |
        Returns video stream default configuration parameters from the system's database
      operationId: frs_getCommonConfig
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: '#/components/schemas/FRSCommonConfig'
              example:
                code: "200"
                message: "Ok"
                data:
                  callback-timeout: 2s
                  comments-blurry-face: The face image is not clear enough for registration.
                  comments-descriptor-creation-error: Failed to register descriptor.
                  comments-descriptor-exists: The descriptor already exists.
                  comments-inference-error: 'Error: Triton Inference Server request failed.'
                  comments-new-descriptor: A new descriptor has been created.
                  comments-no-faces: There are no faces in the image.
                  comments-non-frontal-face: The face in the image must be frontal.
                  comments-non-normal-face-class: A person wearing a mask or dark glasses.
                  comments-partial-face: The face must be fully visible in the image.
                  comments-url-image-error: Failed to receive image.
                  dnn-bd-input-height: 320
                  dnn-bd-input-tensor-name: images
                  dnn-bd-input-width: 320
                  dnn-bd-model-name: barcode_detection
                  dnn-bd-output-tensor-name: output0
                  dnn-fc-input-height: 192
                  dnn-fc-input-tensor-name: input.1
                  dnn-fc-input-width: 192
                  dnn-fc-model-name: genet
                  dnn-fc-output-size: 3
                  dnn-fc-output-tensor-name: '419'
                  dnn-fd-input-height: 320
                  dnn-fd-input-tensor-name: input.1
                  dnn-fd-input-width: 320
                  dnn-fd-model-name: scrfd
                  dnn-fr-input-height: 112
                  dnn-fr-input-tensor-name: input.1
                  dnn-fr-input-width: 112
                  dnn-fr-model-name: arcface
                  dnn-fr-output-size: 512
                  dnn-fr-output-tensor-name: '683'
                  flag-copy-event-data: false
                  inference-timeout: 1s
                  sg-max-descriptor-count: 1000
        '204':
          description: No content
        '400':
          description: Bad request
  /frs/api/setStreamDefaultConfig:
    post:
      tags:
        - Host --> FRS
      summary: Set Video Stream Default Config
      description: |
        Sets video stream default configuration parameters in the system's database
      operationId: frs_setStreamDefaultConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FRSDefaultVStreamConfig'
            example:
              max-capture-error-count: 3
      responses:
        '204':
          description: Successful operation
        '400':
          description: Bad request
  /frs/api/getStreamDefaultConfig:
    post:
      tags:
        - Host --> FRS
      summary: Get Video Stream Default Config
      description: |
        Returns video stream default configuration parameters from the system's database
      operationId: frs_getStreamDefaultConfig
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ResponseBase'
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: '#/components/schemas/FRSDefaultVStreamConfig'
              example:
                code: "200"
                message: "Ok"
                data:
                  barcode-confidence: 0.8
                  best-quality-interval-after: 2s
                  best-quality-interval-before: 5s
                  blur: 300
                  blur-max: 13000
                  capture-timeout: 2s
                  delay-after-error: 30s
                  delay-between-frames: 1s
                  dnn-bd-inference-server: '127.0.0.1:8000'
                  dnn-fc-inference-server: '127.0.0.1:8000'
                  dnn-fd-inference-server: '127.0.0.1:8000'
                  dnn-fr-inference-server: '127.0.0.1:8000'
                  face-class-confidence: 0.7
                  face-confidence: 0.7
                  face-enlarge-scale: 1.5
                  face-iou-threshold: 0.4
                  flag-process-barcodes: false
                  flag-process-faces: true
                  flag-spawned-descriptors: false
                  logs-level: info
                  margin: 5
                  max-capture-error-count: 3
                  open-door-duration: 10s
                  osd-datetime-format: '%Y-%m-%d %H:%M:%S'
                  title-height-ratio: 0.033
                  tolerance: 0.5
                  unknown-descriptor-ttl: 5s
                  workflow-timeout: 0s
        '204':
          description: No content
        '400':
          description: Bad request

