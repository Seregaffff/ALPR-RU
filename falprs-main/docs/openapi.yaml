                  lpc-net-model-name: lpcnet_vit
                  lpc-net-output-tensor-name: output
                  lpd-net-inference-server: '127.0.0.1:8000'
                  lpd-net-input-height: 640
                  lpd-net-input-tensor-name: images
                  lpd-net-input-width: 640
                  lpd-net-model-name: lpdnet_yolo
                  lpd-net-output-tensor-name: output0
                  lpr-net-inference-server: '127.0.0.1:8000'
                  lpr-net-input-height: 320
                  lpr-net-input-tensor-name: images
                  lpr-net-input-width: 320
                  lpr-net-model-name: lprnet_yolo
                  lpr-net-output-tensor-name: output0
